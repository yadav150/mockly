<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockly – SSC GD Mock Test</title>
    <style>
        :root {
            --bg: #f8f9fb;
            --text: #1a1a1a;
            --text-light: #555;
            --text-muted: #777;
            --accent: #a0522d;
            --accent-hover: #8b4513;
            --accent-light: #fdf2ec;
            --border: #dcdde0;
            --radius: 3px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --transition: 0.2s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; }
        .test-wrapper { max-width:800px; margin:2rem auto; padding:0 1rem; }
        .test-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; background:#fff; padding:1.5rem; border-radius:var(--radius); box-shadow:var(--shadow-sm); margin-bottom:1.5rem; border:1px solid var(--border); }
        .test-title { font-size:1.3rem; font-weight:700; }
        .timer { font-size:1.4rem; font-weight:700; background:var(--accent-light); color:var(--accent); padding:0.4rem 1.2rem; border-radius:20px; border:2px solid var(--accent); }
        .timer.warning { color:#d32f2f; border-color:#d32f2f; background:#fdecea; animation:pulse 0.8s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .progress-wrap { background:#fff; border-radius:var(--radius); padding:1rem 1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
        .progress-bar { background:#e9ecef; height:8px; border-radius:10px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--accent); border-radius:10px; transition:width 0.3s; }
        .progress-text { text-align:right; font-size:0.85rem; color:var(--text-muted); margin-top:0.25rem; }
        .question-card { background:#fff; border-radius:var(--radius); padding:1.8rem; box-shadow:var(--shadow-sm); border:1px solid var(--border); margin-bottom:1.5rem; }
        .question-number { font-weight:600; color:var(--accent); font-size:0.9rem; margin-bottom:0.5rem; }
        .question-text { font-size:1.1rem; font-weight:600; margin-bottom:1.5rem; }
        .options-list { list-style:none; display:flex; flex-direction:column; gap:0.75rem; }
        .option-item { display:flex; align-items:center; gap:0.75rem; padding:0.85rem 1rem; border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:var(--transition); background:#fafbfc; }
        .option-item:hover { border-color:#b0b5c0; background:#f5f6f9; }
        .option-item.selected { border-color:var(--accent); background:var(--accent-light); font-weight:600; }
        .option-radio { width:20px; height:20px; border-radius:50%; border:2px solid #888; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .option-item.selected .option-radio { border-color:var(--accent); }
        .option-radio::after { content:""; width:10px; height:10px; border-radius:50%; background:var(--accent); display:none; }
        .option-item.selected .option-radio::after { display:block; }
        .option-text { font-size:0.95rem; }
        .test-nav { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; background:#fff; padding:1rem 1.5rem; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1px solid var(--border); }
        .btn { display:inline-block; padding:0.6rem 1.4rem; border-radius:var(--radius); font-weight:600; font-size:0.9rem; cursor:pointer; border:none; transition:var(--transition); font-family:var(--font); text-decoration:none; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn-outline { background:transparent; color:var(--accent); border:1.5px solid var(--accent); }
        .btn-outline:hover { background:var(--accent-light); }
        .btn-success { background:#16a34a; color:#fff; }
        .btn-success:hover { background:#15803d; }
        .btn:disabled { opacity:0.4; cursor:not-allowed; }
        .results-container { background:#fff; border-radius:var(--radius); padding:2rem; box-shadow:var(--shadow); border:1px solid var(--border); text-align:center; max-width:600px; margin:0 auto; }
        .score-circle { width:120px; height:120px; border-radius:50%; border:6px solid var(--accent); display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; font-size:2.5rem; font-weight:700; color:var(--accent); }
        .score-circle.fail { border-color:#d32f2f; color:#d32f2f; }
        .stats-row { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin:1.5rem 0; }
        .stat-item { background:#f8f9fb; border:1px solid var(--border); border-radius:var(--radius); padding:0.8rem 1.2rem; min-width:80px; }
        .stat-val { font-size:1.4rem; font-weight:700; display:block; }
        .stat-lbl { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; }
        @media (max-width:600px) {
            .test-header { flex-direction:column; align-items:flex-start; }
            .test-nav { flex-direction:column; align-items:stretch; }
            .test-nav .btn { width:100%; }
        }
    </style>
</head>
<body>
    <div class="test-wrapper">
        <div id="testArea">
            <div class="test-header">
                <span class="test-title">SSC GD Mock Test</span>
                <span class="timer" id="timer">10:00</span>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                <div class="progress-text" id="progressText">0 of 10 answered</div>
            </div>
            <div class="question-card">
                <div class="question-number" id="questionNumber">Question 1 of 10</div>
                <div class="question-text" id="questionText"></div>
                <ul class="options-list" id="optionsList"></ul>
            </div>
            <div class="test-nav">
                <button class="btn btn-outline" id="prevBtn">← Previous</button>
                <button class="btn btn-outline" id="skipBtn">Skip</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
                <button class="btn btn-success" id="submitBtn" style="display:none;">Submit</button>
            </div>
        </div>
        <div id="resultsArea" style="display:none;"></div>
    </div>

    <script>
        // ----- SSC GD Questions -----
        const examName = 'SSC GD';
        const examDuration = 10; // minutes
        const questions = [
            { q: 'Who was the first President of India?', options: ['Dr. Rajendra Prasad', 'Jawaharlal Nehru', 'Mahatma Gandhi', 'Sardar Patel'], correct: 0 },
            { q: 'What is the chemical symbol for water?', options: ['O2', 'H2O', 'CO2', 'NaCl'], correct: 1 },
            { q: 'Which planet is known as the Red Planet?', options: ['Venus', 'Mars', 'Jupiter', 'Saturn'], correct: 1 },
            { q: 'What is the capital of India?', options: ['Mumbai', 'Kolkata', 'New Delhi', 'Chennai'], correct: 2 },
            { q: 'Who wrote the Indian national anthem?', options: ['Rabindranath Tagore', 'Bankim Chandra Chatterjee', 'Mahatma Gandhi', 'Subhash Chandra Bose'], correct: 0 },
            { q: 'Which gas is most abundant in Earth\'s atmosphere?', options: ['Oxygen', 'Nitrogen', 'Carbon Dioxide', 'Hydrogen'], correct: 1 },
            { q: 'What is the smallest state in India by area?', options: ['Goa', 'Sikkim', 'Tripura', 'Mizoram'], correct: 0 },
            { q: 'The currency of Japan is?', options: ['Yuan', 'Won', 'Yen', 'Ringgit'], correct: 2 },
            { q: 'Which non-metal remains liquid at room temperature?', options: ['Phosphorus', 'Bromine', 'Chlorine', 'Helium'], correct: 1 },
            { q: 'The largest ocean in the world is?', options: ['Atlantic', 'Indian', 'Arctic', 'Pacific'], correct: 3 }
        ];

        // ----- Test Engine -----
        const STORAGE_KEY = 'mocklyTestHistory';
        let currentIndex = 0;
        let answers = {};
        let timerInterval = null;
        let timeRemaining = examDuration * 60;

        // Elements
        const timerEl = document.getElementById('timer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const questionNumber = document.getElementById('questionNumber');
        const questionText = document.getElementById('questionText');
        const optionsList = document.getElementById('optionsList');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');
        const submitBtn = document.getElementById('submitBtn');
        const testArea = document.getElementById('testArea');
        const resultsArea = document.getElementById('resultsArea');

        // Helpers
        function getHistory() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
        function saveHistory(h) { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }
        function saveResult(exam, score, total, status) {
            const hist = getHistory();
            const date = new Date().toISOString().split('T')[0];
            const passed = score >= 60;
            hist.push({ exam, date, score: score+'%', status: status || (passed?'Passed':'Failed'), questions: total });
            if (hist.length > 20) hist.splice(0, hist.length - 20);
            saveHistory(hist);
        }
        function formatTime(s) { const m=Math.floor(s/60), sec=s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }

        function startTimer() {
            timeRemaining = examDuration * 60;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) { clearInterval(timerInterval); submitTest(); }
            }, 1000);
        }
        function updateTimerDisplay() {
            timerEl.textContent = formatTime(timeRemaining);
            timerEl.classList.toggle('warning', timeRemaining < 60);
        }
        function updateProgress() {
            const cnt = Object.keys(answers).length;
            progressFill.style.width = (cnt / questions.length * 100) + '%';
            progressText.textContent = `${cnt} of ${questions.length} answered`;
        }
        function renderQuestion() {
            const q = questions[currentIndex];
            questionNumber.textContent = `Question ${currentIndex+1} of ${questions.length}`;
            questionText.textContent = q.q;
            optionsList.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const li = document.createElement('li');
                li.className = `option-item ${answers[currentIndex] === idx ? 'selected' : ''}`;
                li.innerHTML = `<span class="option-radio"></span><span class="option-text">${String.fromCharCode(65+idx)}. ${opt}</span>`;
                li.addEventListener('click', () => selectOption(idx));
                optionsList.appendChild(li);
            });
            prevBtn.disabled = currentIndex === 0;
            if (currentIndex === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                submitBtn.style.display = 'none';
            }
            skipBtn.style.display = 'inline-block';
        }
        function selectOption(optIdx) {
            answers[currentIndex] = optIdx;
            updateProgress();
            renderQuestion();
        }
        function nextQuestion() { if (currentIndex < questions.length-1) { currentIndex++; renderQuestion(); } }
        function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
        function skipQuestion() { if (currentIndex < questions.length-1) { currentIndex++; renderQuestion(); } }

        function submitTest() {
            clearInterval(timerInterval);
            const correctCount = questions.reduce((sum, q, i) => sum + (answers[i] === q.correct ? 1 : 0), 0);
            const unansweredCount = questions.length - Object.keys(answers).length;
            const incorrectCount = questions.length - correctCount - unansweredCount;
            const score = Math.round((correctCount / questions.length) * 100);
            const timeTaken = (examDuration * 60) - timeRemaining;

            // Save result (will appear in dashboard)
            saveResult(examName, score, questions.length);

            // Show results
            testArea.style.display = 'none';
            resultsArea.style.display = 'block';
            resultsArea.innerHTML = `
                <div class="results-container">
                    <h2>${examName} – Results</h2>
                    <div class="score-circle ${score >= 60 ? '' : 'fail'}">${score}%</div>
                    <p style="font-weight:600; margin-bottom:1rem;">${score >= 60 ? '🎉 Congratulations! You passed.' : '💪 Keep practicing!'}</p>
                    <div class="stats-row">
                        <div class="stat-item"><span class="stat-val" style="color:#16a34a;">${correctCount}</span><span class="stat-lbl">Correct</span></div>
                        <div class="stat-item"><span class="stat-val" style="color:#d32f2f;">${incorrectCount}</span><span class="stat-lbl">Incorrect</span></div>
                        <div class="stat-item"><span class="stat-val" style="color:#888;">${unansweredCount}</span><span class="stat-lbl">Skipped</span></div>
                        <div class="stat-item"><span class="stat-val">${formatTime(timeTaken)}</span><span class="stat-lbl">Time</span></div>
                    </div>
                    <div style="margin-top:1.5rem; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
                        <a href="index.html" class="btn btn-primary">Back to Exams</a>
                        <a href="dashboard.html" class="btn btn-outline">Go to Dashboard</a>
                    </div>
                </div>
            `;
        }

        // Event Listeners
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        skipBtn.addEventListener('click', skipQuestion);
        submitBtn.addEventListener('click', submitTest);

        // Start
        if (questions.length === 0) {
            testArea.innerHTML = '<p style="text-align:center; padding:2rem;">No questions available.</p>';
        } else {
            startTimer();
            updateProgress();
            renderQuestion();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockly – My Dashboard</title>
    <link rel="stylesheet" href="Style.css">
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

    <header class="nav" role="banner">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo" aria-label="Mockly Home">Mock<span>ly</span></a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">Home</a>
                <button class="btn btn-primary" id="btnLogout">Logout</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="section dashboard-page">
            <div class="dashboard-container">

                <!-- Profile Section -->
                <div class="profile-section">
                    <div class="avatar-circle" id="avatarCircle">
                        <!-- Human silhouette placeholder SVG -->
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" class="avatar-silhouette">
                            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .66.54 1.2 1.2 1.2h16.8c.66 0 1.2-.54 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <h2 id="dashboardName">Student</h2>
                        <p id="dashboardEmail">email@example.com</p>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-value" id="dashTestsTaken">0</div>
                        <div class="stat-label">Tests Taken</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-value" id="dashAvgScore">0%</div>
                        <div class="stat-label">Avg Score</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🏆</div>
                        <div class="stat-value" id="dashRank">#0</div>
                        <div class="stat-label">Rank</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">❓</div>
                        <div class="stat-value" id="dashQuestions">0</div>
                        <div class="stat-label">Questions</div>
                    </div>
                </div>

                <!-- Recent Tests Table -->
                <div class="recent-tests-section">
                    <h3>Recent Tests</h3>
                    <div class="table-wrap">
                        <table class="recent-table" id="recentTestsTable">
                            <thead>
                                <tr>
                                    <th>Exam</th>
                                    <th>Date</th>
                                    <th>Score</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- populated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <p id="noRecentTests" style="display:none; text-align:center; color:var(--text-muted);">No tests taken yet. <a href="index.html#exams">Start one now!</a></p>
                </div>

                <!-- Action Buttons -->
                <div class="dashboard-actions">
                    <a href="index.html#exams" class="btn btn-primary">Start a New Test</a>
                    <a href="index.html#leaderboard" class="btn btn-outline">View Leaderboard</a>
                </div>

            </div>
        </section>
    </main>

    <!-- Logout Confirmation Popup -->
    <div class="logout-popup-overlay" id="logoutPopupOverlay" aria-hidden="true">
        <div class="logout-popup" role="dialog" aria-modal="true" aria-labelledby="logoutMessage">
            <div class="logout-checkmark">✔</div>
            <p id="logoutMessage">Successfully logged out!</p>
        </div>
    </div>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <span>&copy; 2026 Mockly</span>
            </div>
        </div>
    </footer>

    <!-- Firebase shared config & auth functions -->
    <script src="firebase.js"></script>
    <!-- Dashboard specific logic -->
    <script src="js/dash-script.js"></script>
</body>
</html>
